<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="session.css" />
  </head>
  <body>
    <div id="profile-screen" class="profile-container">
      <h1>Quem está assistindo?</h1>

      <div class="profiles-list">
        <div class="profile-card" onclick="selectProfile('Gabriel')">
          <div class="avatar-wrapper">
            <img
              src="https://mir-s3-cdn-cf.behance.net/project_modules/disp/1bdc9a33850498.56ba69ac2ba5b.png"
              alt="Gabriel"
            />
          </div>
          <span>Gabriel</span>
        </div>

        <div class="profile-card" onclick="selectProfile('Infantil')">
          <div class="avatar-wrapper">
            <img
              src="https://i.pinimg.com/736x/ec/74/7a/ec747a688a5d6232663caaf114bad1c3.jpg"
              alt="Kids"
            />
          </div>
          <span>Infantil</span>
        </div>

        <div class="profile-card">
          <div class="avatar-wrapper add-profile">
            <i class="bx bx-plus-circle"></i>
          </div>
          <span>Adicionar Perfil</span>
        </div>
      </div>

      <button class="manage-profiles">Gerenciar perfis</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
